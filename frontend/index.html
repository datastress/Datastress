<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataStress</title>
  <!-- CSS with cache-busting -->
  <link rel="stylesheet" href="style.css?v=<?= Date.now() ?>">
</head>
<body>
  <div id="app">
    <h1>DataStress</h1>
    <div id="counter">0 MB | 0 Mbps</div>
    
    <div class="slots">
      <span class="slot">🍒</span>
      <span class="slot">🍋</span>
      <span class="slot">💎</span>
    </div>

    <button onclick="start()">Start</button>
    <button onclick="stop()">Stop</button>

    <h2>Login / Register</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>

    <h2>Upgrade</h2>
    <button onclick="upgradeStripe()">Stripe</button>
    <button onclick="upgradePayPal()">PayPal</button>
    <button onclick="upgradeMBWay()">MBWay</button>
  </div>

  <!-- JS with cache-busting -->
  <script src="app.js?v=<?= Date.now() ?>"></script>
</body>
</html>
